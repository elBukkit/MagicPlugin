pools_vines:
  class: Vines
  height: 8 | 32
  vines:
    - cave_vines[age=0,berries=true]
    - cave_vines

pools_features:
  class: Random
  populators:
    pools_vines: 0.02
    none: 1

pools_mobs:
  class: Spawn
  types:
    hopper: 0.05
    pink_floaty: 0.02
    yellow_floaty: 0.02
    none: 1

pools_pools:
  class: Probability
  probability: 0.9
  populator:
    class: Pools
    island_probability: 0.75
    depth: 1 | 2
    walkway_width: 1 | 12

pools_lights:
    class: Lights
    light_blocks:
      - sea_lantern
