concrete_ground:
  class: Perlin
  biome: basalt_deltas
  noise: 0.05
  blocks: concrete_ground
  top_blocks: concrete_top
  max_elevation: 1
  min_elevation: 0
  min_clip_elevation: 0
  max_clip_elevation: 0

concrete_exit:
  populators:
  - concrete_tower
  - concrete_tunnel
  - concrete_portal

concrete_surface:
  class: Random
  generators:
    concrete_food:
      min_distance: 64
      max_distance: 512
      weight: 0.01
    concrete_car:
      min_distance: 16
      max_distance: 512
      weight: 0.1
    concrete_tower:
      min_distance: 32
      max_distance: 512
      weight: 0.5
      frequency: 48
    concrete_exit:
      min_distance: 512
      max_distance: 2048
      weight: 0.2
      frequency: 48
    none: 1

concrete:
  class: Sequence
  generators:
    - bedrock
    - concrete_ground
    - concrete_surface
