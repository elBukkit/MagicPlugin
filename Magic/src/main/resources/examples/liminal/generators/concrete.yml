concrete_ground:
  class: Perlin
  biome: basalt_deltas
  noise: 0.05
  blocks: concrete_ground
  top_blocks: concrete_top
  max_elevation: 1
  min_elevation: 0
  min_clip_elevation: 0
  max_clip_elevation: 0

concrete_food:
  class: Crops
  border: pale_oak_pressure_plate
  crops: carrots,potatoes
  support: white_concrete
  soil: sea_lantern
  min_age: 0.2
  max_age: 1
  min_width: 1
  max_width: 3
  min_position: 0
  max_position: 14

concrete_exit:
  populators:
  - concrete_tower
  - concrete_exit

concrete_surface:
  class: Random
  generators:
    concrete_food:
      min_distance: 64
      max_distance: 512
      weight: 0.05
    concrete_tower:
      min_distance: 32
      max_distance: 512
      weight: 0.5
      frequency: 48
    concrete_exit:
      min_distance: 512
      max_distance: 2048
      weight: 0.25
      frequency: 48
    none: 1

concrete:
  class: Sequence
  generators:
    - concrete_ground
    - concrete_surface
