pools_surface:
  class: Flat
  biome: lush_caves
  blocks:
    - blue_concrete
    - light_blue_concrete

pools_rooms:
  class: Room
  roof_height: 6 | 16
  doorway_height: 3 | 6
  doorway_width: 6 | 10
  wall_probability: 0.75
  window_probability: 0.3
  double_door_probability: 0.5
  populators:
    #- pools_pools
    #- pools_lights
    - pools_mobs
    - pools_features
  wall_blocks:
    - polished_diorite
    - diorite
    - quartz_block
  ceiling_blocks:
    - polished_diorite
    - diorite
    - quartz_block

pools:
  class: Sequence
  generators:
    - bedrock
    - pools_surface
    - pools_rooms
